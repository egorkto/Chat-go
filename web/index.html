<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>
<script type="text/javascript">
window.onload = function () {
    var conn;
    var msg = document.getElementById("msg");
    var log = document.getElementById("log");

    function appendLog(item) {
        var doScroll = log.scrollTop > log.scrollHeight - log.clientHeight - 1;
        log.appendChild(item);
        if (doScroll) {
            log.scrollTop = log.scrollHeight - log.clientHeight;
        }
    }

    document.getElementById("form").onsubmit = function () {
        if (!conn || !msg.value) {
            return false;
        }

        var messagePayload = {
            text: msg.value.trim()
        };

        var jsonString = JSON.stringify(messagePayload);

        conn.send(jsonString);
        msg.value = "";
        return false;
    };

    var token = localStorage.getItem("access_token")

    if (window["WebSocket"]) {
        conn = new WebSocket("ws://" + document.location.host + "/chat/connect?token=" + encodeURIComponent(token));
        conn.onclose = function (evt) {
            var item = document.createElement("div");
            item.innerHTML = "<b>Connection closed.</b>";
            appendLog(item);
        };
        conn.onmessage = function (evt) {
            var data = JSON.parse(evt.data);
            var item = document.createElement("div");
            item.innerText = data.text;
            appendLog(item);
        };
    } else {
        var item = document.createElement("div");
        item.innerHTML = "<b>Your browser does not support WebSockets.</b>";
        appendLog(item);
    }
};
</script>
<style type="text/css">
body { 
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f4f4f9;
    margin: 0; 
    overflow: hidden;
}

.chat-container { 
    background: white;
    padding: 30px; 
    display: flex;
    width: 100%;
    height: 100vh; /* Растягиваем контейнер на всю высоту экрана */
    flex-direction: column;
    box-sizing: border-box;
}

h2 { 
    margin-top: 0;
    margin-bottom: 20px; 
    text-align: center; 
    color: #333; 
}

#log {
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 10px;
    flex-grow: 1; /* Окно чата теперь занимает всё свободное место по вертикали */
    overflow-y: auto;
    margin-bottom: 15px;
    box-sizing: border-box;
    font-size: 14px;
}

.chat-message {
    padding: 6px 10px;
    background: #f1f1f4;
    border-radius: 4px;
    margin-bottom: 8px;
    word-break: break-all;
    color: #333;
}

.system-message {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
}

.system-message.error {
    color: #007bff;
}

/* Ограничиваем контент по центру, чтобы элементы не растягивались на широких экранах */
#form, h2, #log {
    width: 100%;
    max-width: 600px; /* Оптимальная ширина для чата */
    margin-left: auto;
    margin-right: auto;
}

.form-group {
    margin-bottom: 15px; 
}

label { 
    display: block; 
    margin-bottom: 5px; 
    color: #666; 
}

input[type="text"] { 
    width: 100%; 
    padding: 10px; 
    border: 1px solid #ddd; 
    border-radius: 4px; 
    box-sizing: border-box; 
    font-size: 14px;
}

input[type="text"]:focus {
    border-color: #007bff;
    outline: none;
}

button { 
    width: 100%; 
    padding: 10px; 
    background-color: #007bff; 
    color: white; 
    border: none; 
    border-radius: 4px; 
    font-size: 16px; 
    cursor: pointer; 
    font-weight: bold;
}

button:hover { 
    background-color: #0056b3; 
}
</style>
</head>
<body>

<div class="chat-container">
    <h2>Чат</h2>
    
    <div id="log"></div>
    
    <form id="form">
        <div class="form-group">
            <label for="msg">Cообщение</label>
            <input type="text" id="msg" placeholder="Введите текст..." autofocus autocomplete="off" />
        </div>
        <button type="submit">Отправить</button>
    </form>
</div>

</body>
</html>
