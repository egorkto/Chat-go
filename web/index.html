<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --bg: #0e0f13;
        --surface: #16181f;
        --surface-2: #1e2029;
        --border: #2a2d38;
        --border-focus: #6c63ff;
        --accent: #6c63ff;
        --accent-hover: #5a52e0;
        --text: #eeeef0;
        --text-muted: #7a7d8c;
        --error: #ff5f6d;
        --header-h: 58px;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* ── HEADER ── */
    header {
        height: var(--header-h);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        flex-shrink: 0;
        z-index: 100;
    }

    .logo {
        font-family: 'Syne', sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        text-decoration: none;
        letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    nav { display: flex; gap: 8px; }

    .nav-btn {
        padding: 7px 18px;
        border-radius: 6px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .nav-btn.outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
    }
    .nav-btn.outline:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn.filled {
        background: var(--accent);
        border: 1px solid var(--accent);
        color: #fff;
    }
    .nav-btn.filled:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    /* ── CHAT ── */
    .chat-wrapper {
        flex: 1;
        display: flex;
        justify-content: center;
        overflow: hidden;
        padding: 0;
    }

    .chat-inner {
        width: 100%;
        max-width: 680px;
        display: flex;
        flex-direction: column;
        padding: 20px 16px 20px;
    }

    #log {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
        margin-bottom: 16px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
    }

    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-message {
        padding: 10px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 8px;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text);
        word-break: break-word;
        animation: msgIn 0.2s ease;
    }

    @keyframes msgIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .system-message {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 10px;
    }

    .system-message.error { color: var(--error); }

    /* ── FORM ── */
    #form {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    .input-wrap {
        flex: 1;
    }

    label.input-label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 5px;
        font-weight: 500;
        letter-spacing: 0.3px;
    }

    input[type="text"] {
        width: 100%;
        padding: 11px 14px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        transition: border-color 0.18s, box-shadow 0.18s;
        outline: none;
    }
    input[type="text"]::placeholder { color: var(--text-muted); opacity: 0.6; }
    input[type="text"]:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    button[type="submit"] {
        padding: 11px 22px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.18s, transform 0.1s;
        flex-shrink: 0;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:active { transform: scale(0.97); }
</style>
</head>
<body>

<header>
    <a href="/" class="logo">Чат<span>•</span></a>
    <nav>
        <a href="/log-in" class="nav-btn outline">Войти</a>
        <a href="/sign-up" class="nav-btn filled">Регистрация</a>
    </nav>
</header>

<div class="chat-wrapper">
    <div class="chat-inner">
        <div id="log"></div>
        <form id="form">
            <div class="input-wrap">
                <label class="input-label" for="msg">Сообщение</label>
                <input type="text" id="msg" placeholder="Введите текст…" autofocus autocomplete="off" />
            </div>
            <button type="submit">Отправить</button>
        </form>
    </div>
</div>

<script>
window.onload = function () {
    var conn;
    var msg = document.getElementById("msg");
    var log = document.getElementById("log");

    // Функция создания HTML-элемента для одного сообщения
    function createMessageElement(msgData) {
        var item = document.createElement("div");
        item.className = "chat-message";
        
        var timeStr = "";
        if (msgData.send_at) {
            var date = new Date(msgData.send_at);
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            timeStr = hours + ":" + minutes;
        }

        var login = (msgData.sender && msgData.sender.login) ? msgData.sender.login : "Аноним";

        item.innerHTML = '<span class="msg-time" style="color: #888; font-size: 0.85em; margin-right: 5px;">[' + timeStr + ']</span>' +
                         '<strong class="msg-user" style="color: #007bff; margin-right: 5px;">' + login + ':</strong>' +
                         '<span class="msg-text"></span>';
        
        // Безопасно вставляем текст пользователя для защиты от XSS
        item.querySelector('.msg-text').textContent = msgData.text;
        return item;
    }

    function appendLog(item) {
        var doScroll = log.scrollTop > log.scrollHeight - log.clientHeight - 1;
        log.appendChild(item);
        if (doScroll) {
            log.scrollTop = log.scrollHeight - log.clientHeight;
        }
    }

    document.getElementById("form").onsubmit = function () {
        if (!conn || !msg.value.trim()) return false;
        conn.send(JSON.stringify({ text: msg.value.trim() }));
        msg.value = "";
        return false;
    };

    var token = localStorage.getItem("access_token");

    if (window["WebSocket"]) {
        conn = new WebSocket("ws://" + document.location.host + "/chat/connect?token=" + encodeURIComponent(token));
        
        conn.onclose = function () {
            var item = document.createElement("div");
            item.className = "system-message error";
            item.textContent = "Соединение закрыто.";
            appendLog(item);
        };
        
        conn.onmessage = function (evt) {
            var data = JSON.parse(evt.data);
            var item = createMessageElement(data);
            appendLog(item);
        };
        
        conn.onopen = function () {
            var item = document.createElement("div");
            item.className = "system-message";
            item.textContent = "Подключено";
            appendLog(item);

            // Запрос истории сообщений с передачей токена авторизации
            fetch("/chat/history", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token // Или другой формат, который ожидает ваш Go сервер
                }
            })
            .then(function (response) {
                if (!response.ok) throw new Error("Ошибка загрузки истории");
                return response.json();
            })
            .then(function (messages) {
                if (Array.isArray(messages)) {
                    messages.forEach(function (msgData) {
                        var historyItem = createMessageElement(msgData);
                        appendLog(historyItem);
                    });
                }
            })
            .catch(function (error) {
                var errorItem = document.createElement("div");
                errorItem.className = "system-message error";
                errorItem.textContent = "Не удалось загрузить историю.";
                appendLog(errorItem);
                console.error(error);
            });
        };
    } else {
        var item = document.createElement("div");
        item.className = "system-message error";
        item.textContent = "Ваш браузер не поддерживает WebSockets.";
        appendLog(item);
    }
};
</script>
</body>
</html>
