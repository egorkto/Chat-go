<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0f13;
            --surface: #16181f;
            --surface-2: #1e2029;
            --border: #2a2d38;
            --border-focus: #6c63ff;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --text: #eeeef0;
            --text-muted: #7a7d8c;
            --error: #ff5f6d;
            --success: #3ecf8e;
            --header-h: 58px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--accent); }

        nav { display: flex; gap: 8px; }

        .nav-btn {
            padding: 7px 18px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.18s, color 0.18s, border-color 0.18s;
        }

        .nav-btn.outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .nav-btn.outline:hover { border-color: var(--accent); color: var(--accent); }

        .nav-btn.filled {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #fff;
        }
        .nav-btn.filled:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            animation: fadeUp 0.35s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .card-sub a { color: var(--accent); text-decoration: none; }
        .card-sub a:hover { text-decoration: underline; }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.18s, box-shadow 0.18s;
            outline: none;
        }

        input::placeholder { color: var(--text-muted); opacity: 0.6; }

        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }

        input.is-error { border-color: var(--error); }
        input.is-error:focus { box-shadow: 0 0 0 3px rgba(255,95,109,0.15); }

        .field-error {
            display: none;
            font-size: 12px;
            color: var(--error);
            margin-top: 5px;
        }

        .field-error.visible { display: block; }

        /* global banner */
        .banner {
            display: none;
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 3px solid;
        }
        .banner.error { background: rgba(255,95,109,0.1); border-color: var(--error); color: var(--error); }
        .banner.success { background: rgba(62,207,142,0.1); border-color: var(--success); color: var(--success); }
        .banner.visible { display: block; }

        /* submit */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, transform 0.1s;
            margin-top: 6px;
            position: relative;
        }

        .btn-submit:hover { background: var(--accent-hover); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

        .btn-submit .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }
        .btn-submit.loading .spinner { display: block; }

        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">Чат<span>•</span></a>
    <nav>
        <a href="/log-in.html" class="nav-btn outline">Войти</a>
        <a href="/sign-up.html" class="nav-btn filled">Регистрация</a>
    </nav>
</header>

<main>
    <div class="card">
        <div class="card-title">Создать аккаунт</div>
        <div class="card-sub">Уже есть аккаунт? <a href="/log-in">Войти</a></div>

        <div id="banner" class="banner"></div>

        <form id="signUpForm" novalidate>
            <div class="form-group">
                <label for="full-name">Имя</label>
                <input type="text" id="full-name" name="full-name" placeholder="Введите ваше имя" autocomplete="name">
                <div class="field-error" id="err-name"></div>
            </div>
            <div class="form-group">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" placeholder="Придумайте логин" autocomplete="username">
                <div class="field-error" id="err-login"></div>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Не менее 6 символов" autocomplete="new-password">
                <div class="field-error" id="err-password"></div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                Создать аккаунт
                <span class="spinner"></span>
            </button>
        </form>
    </div>
</main>

<script>
const form     = document.getElementById('signUpForm');
const banner   = document.getElementById('banner');
const submitBtn = document.getElementById('submitBtn');

function setFieldError(inputId, errId, message) {
    const input = document.getElementById(inputId);
    const err   = document.getElementById(errId);
    if (message) {
        input.classList.add('is-error');
        err.textContent = message;
        err.classList.add('visible');
    } else {
        input.classList.remove('is-error');
        err.textContent = '';
        err.classList.remove('visible');
    }
}

function clearErrors() {
    [['full-name','err-name'],['login','err-login'],['password','err-password']].forEach(([i,e]) => setFieldError(i, e, ''));
    banner.className = 'banner';
    banner.textContent = '';
}

function showBanner(type, text) {
    banner.className = `banner ${type} visible`;
    banner.textContent = text;
}

function validate(data) {
    let ok = true;
    if (!data.full_name.trim()) {
        setFieldError('full-name', 'err-name', 'Введите ваше имя'); ok = false;
    } else if (data.full_name.trim().length < 2) {
        setFieldError('full-name', 'err-name', 'Имя должно содержать не менее 2 символов'); ok = false;
    }
    if (!data.login.trim()) {
        setFieldError('login', 'err-login', 'Введите логин'); ok = false;
    } else if (data.login.trim().length < 3) {
        setFieldError('login', 'err-login', 'Логин должен содержать не менее 3 символов'); ok = false;
    } else if (!/^[a-zA-Z0-9_]+$/.test(data.login.trim())) {
        setFieldError('login', 'err-login', 'Логин может содержать только буквы, цифры и _'); ok = false;
    }
    if (!data.password) {
        setFieldError('password', 'err-password', 'Введите пароль'); ok = false;
    } else if (data.password.length < 6) {
        setFieldError('password', 'err-password', 'Пароль должен содержать не менее 6 символов'); ok = false;
    }
    return ok;
}

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();

    const data = {
        full_name: document.getElementById('full-name').value,
        login:     document.getElementById('login').value,
        password:  document.getElementById('password').value
    };

    if (!validate(data)) return;

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
        const response = await fetch('/sign-up', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            if (result.access_token) {
                localStorage.setItem('access_token', result.access_token);
                showBanner('success', 'Регистрация прошла успешно! Перенаправление…');
                setTimeout(() => window.location.href = '/', 900);
            } else {
                showBanner('error', 'Ошибка: сервер не прислал токен.');
            }
        } else {
            // Server-side validation errors
            if (result.errors && typeof result.errors === 'object') {
                Object.entries(result.errors).forEach(([field, msg]) => {
                    if (field === 'full_name') setFieldError('full-name', 'err-name', msg);
                    else if (field === 'login')    setFieldError('login', 'err-login', msg);
                    else if (field === 'password') setFieldError('password', 'err-password', msg);
                });
            } else {
                showBanner('error', result.message || 'Ошибка регистрации. Попробуйте снова.');
            }
        }
    } catch {
        showBanner('error', 'Не удалось подключиться к серверу.');
    } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
    }
});

// Clear field error on input
['full-name','login','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const errMap = {'full-name':'err-name','login':'err-login','password':'err-password'};
        setFieldError(id, errMap[id], '');
    });
});
</script>
</body>
</html>
