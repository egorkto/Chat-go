services:
  chat-app:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/chat/Dockerfile
    container_name: chat-app
    environment:
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/out/logs

      - HTTP_SERVER_PORT=${HTTP_SERVER_PORT}

      - JWT_ACCESS_EXP=${JWT_ACCESS_EXP}
      - JWT_REFRESH_EXP=${JWT_REFRESH_EXP}
      - JWT_ISS=${JWT_ISS}
      - JWT_AUD=${JWT_AUD}
      - JWT_PRIVATE_PATH=/app/certs/app.rsa
      - JWT_PUBLIC_PATH=/app/certs/app.rsa.pub

      - POSTGRES_HOST=postgres-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - POSTGRES_PORT=${POSTGRES_PORT}
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
      - ${PROJECT_ROOT}/certs:/app/certs:ro
      - ${PROJECT_ROOT}/web:/app/web:ro
    ports:
      - "8081:${HTTP_SERVER_PORT}"
    restart: always

  postgres-db:
    image: postgres:18.1-bookworm
    container_name: chat-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - chat-db-data:/var/lib/postgresql
    restart: always

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:postgres-db:5432
    ports:
      - "${POSTGRES_PORT}:5432"

  postgres-go-migration:
    image: migrate/migrate:v4.19.1
    user: "${UID}:${GID}"
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

volumes:
  chat-db-data:
  chat-logs: